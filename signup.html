<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - LinkUp</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <h2 class="logo">LinkUp</h2>
        <div class="nav-right">
            <button id="toggleTheme">🌙</button>
        </div>
    </header>
    <div class="welcome-container">
        <div class="welcome-card">
            <h2>Create Account</h2>
            <p>Sign up to get started</p>
            <input type="text" id="signupName" placeholder="Enter name" style="width: 300px;">
            <input type="email" id="signupEmail" placeholder="Enter email" style="width: 300px;">
            <input type="password" id="signupPassword" placeholder="Enter password" style="width: 300px;">
            <button id="signupBtn" class="signup-btn" style="margin-top: 10px;">Sign Up</button>
            <p class="signup">
                Already have an account?
                <a class="signup-link" href="login.html">Login</a>
            </p>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        const savedTheme = localStorage.getItem("theme");
        if(savedTheme === "true"){
            document.body.classList.add("dark");
        }
        const toggleBtn = document.getElementById("toggleTheme");
        if(toggleBtn){
            toggleBtn.addEventListener("click", () => {
                document.body.classList.toggle("dark");
                const isDark = document.body.classList.contains("dark");
                localStorage.setItem("theme", isDark);
                toggleBtn.textContent = isDark ? "☀️" : "🌙";
            });
            toggleBtn.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
        }
    </script>
</body>
</html>

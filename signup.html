<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - LinkUp</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="top-bar">
        <button id="toggleTheme">🌙</button>
    </div>
    <div class="welcome-container">
        <div class="welcome-card">
            <h2>Create Account</h2>
            <p>Sign up to get started</p>
            <input type="text" id="signupName" placeholder="Enter name">
            <input type="email" id="signupEmail" placeholder="Enter email">
            <input type="password" id="signupPassword" placeholder="Enter password">
            <button id="signupBtn" class="signup-btn">Sign Up</button>
            <p class="login">
                Already have an account?
                <a class="login-link" href="login.html">Login</a>
            </p>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        const savedTheme = localStorage.getItem("theme");
        if(savedTheme === "true"){
            document.body.classList.add("light-mode")
        }
        const toggleBtn = document.getElementById("toggleTheme");
        if(toggleBtn){
            toggleBtn.addEventListener("click",()=>{
                document.body.classList.toggle("light-mode");
                const isLight = document.body.classList.contains("light-mode");
                localStorage.setItem("theme", isLight)
            })
        }
    </script>
</body>
</html>

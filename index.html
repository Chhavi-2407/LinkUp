<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkUp</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <h2 class="logo">LinkUp</h2>
        <div class="nav-right">
            <button id="toggleTheme" title="Toggle theme">🌙</button>
            <a href="login.html" class="login-btn">Login</a>
        </div>
    </header>

    <section class="intro">
        <div class="introDiv">
            <h3>DISCOVER OPPORTUNITIES</h3>
            <h1>LinkUp 🚀</h1>
            <p>Find hackathons, internships, and tech events — all in one place.</p>
            <div class="intro-buttons">
                <a href="signup.html" class="signup-btn">Get Started</a>
                <a href="login.html" class="login-btn-div">Login</a>
            </div>
        </div>
    </section>
    <section class="features">
        <div class="feature-card">
            <h3>⚡️ Fast Search</h3>
            <p>Find events instantly with smart filters</p>
        </div>
        <div class="feature-card">
            <h3>❤️ Save Favorites</h3>
            <p>Bookmark opportunities for later</p>
        </div>
        <div class="feature-card">
            <h3>⏰ Reminders</h3>
            <p>Never miss deadlines again</p>
        </div>
    </section>
    <script>
        const savedTheme = localStorage.getItem("theme");
        if(savedTheme === "true"){
            document.body.classList.add("dark");
        }
        const toggleBtn = document.getElementById("toggleTheme");
        if(toggleBtn){
            toggleBtn.addEventListener("click", () => {
                document.body.classList.toggle("dark");
                const isDark = document.body.classList.contains("dark");
                localStorage.setItem("theme", isDark);
                toggleBtn.textContent = isDark ? "☀️" : "🌙";
            });
            toggleBtn.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
        }
        const currentUser = localStorage.getItem("currentUser");
        if(currentUser){
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
